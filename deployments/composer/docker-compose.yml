services:
  mcp:
    container_name: mcp-demo
    image: mcp-demo
    build:
      context: ../..
    ports:
      - "8000:8000"
    expose:
      - "8000"
    environment:
      - ENVIRONMENT=Production
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
